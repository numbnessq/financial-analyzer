name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            backend_name: backend
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            backend_name: backend.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            backend_name: backend

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps + PyInstaller
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Build backend binary (PyInstaller)
        run: python scripts/build_backend.py

      # Tauri требует бинарь в binaries/ с суффиксом target-triple
      - name: Get Rust target triple
        id: triple
        shell: bash
        run: |
          TRIPLE=$(rustc -vV | grep 'host:' | awk '{print $2}')
          echo "triple=$TRIPLE" >> $GITHUB_OUTPUT

      - name: Copy backend binary to tauri binaries
        shell: bash
        run: |
          mkdir -p tauri/src-tauri/binaries
          cp dist/backend/${{ matrix.backend_name }} \
             tauri/src-tauri/binaries/backend-${{ steps.triple.outputs.triple }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.0-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: tauri
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                       ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY:                  ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD:                 ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath:  tauri
          tagName:      ${{ github.ref_name }}
          releaseName:  'Financial Analyzer ${{ github.ref_name }}'
          releaseBody:  'See assets below to download.'
          releaseDraft: false
          prerelease:   false